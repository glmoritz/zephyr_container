#
# ESP32-S3 Built-in JTAG for Zephyr RTOS debugging.
#
# "Zephyr" RTOS plugin doesn't support SMP (dual-core) targets and crashes
# at "target smp cpu0 cpu1". Use "hwthread" instead - it exposes each CPU
# core as a hardware thread, suppresses the FreeRTOS errors, and works fine
# with Zephyr. Full OS-aware thread listing is not available this way but
# breakpoints, stepping and register inspection all work correctly.

source [find interface/esp_usb_bridge.cfg]

set ESP_RTOS "hwthread"

source [find target/esp32s3.cfg]
